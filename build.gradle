plugins {
    id 'java'
    id 'com.gradleup.shadow' version '8.3.6'
}

group = 'com.zerowars'
version = '1.1.1'
description = 'ZeroWars - Competitive PvP Zone Control Plugin'

repositories {
    mavenCentral()
    maven { url = 'https://repo.papermc.io/repository/maven-public/' }
    maven { url = 'https://repo.extendedclip.com/content/repositories/placeholderapi/' }
}

dependencies {
    // Paper API — compilamos contra 1.20.1 (mínimo soportado).
    // El plugin corre en 1.20.1 → 1.21.x gracias a VersionUtil.
    compileOnly 'io.papermc.paper:paper-api:1.20.1-R0.1-SNAPSHOT'

    // PlaceholderAPI
    compileOnly 'me.clip:placeholderapi:2.11.5'

    // SQLite JDBC (shaded into jar)
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'

    // HikariCP para connection pooling (shaded)
    implementation 'com.zaxxer:HikariCP:5.1.0'
}

processResources {
    def props = [version: version]
    inputs.properties(props)
    filteringCharset 'UTF-8'
    filesMatching('plugin.yml') {
        expand(props)
    }
}

// Target Java 17 bytecode — compatible con Paper 1.20.x (Java 17) y 1.21.x (Java 21)
// No se usa toolchain para evitar depender de una JDK específica en el agente de build.
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 17
}

shadowJar {
    archiveClassifier.set('')
    relocate 'org.sqlite', 'com.zerowars.libs.sqlite'
    relocate 'com.zaxxer.hikari', 'com.zerowars.libs.hikari'
    // mergeServiceFiles preserva META-INF/services (registro JDBC del driver SQLite)
    mergeServiceFiles()
    // Excluir sqlite-jdbc del minimize: sus clases solo se cargan por reflexión
    // vía HikariCP/DriverManager — minimize() las eliminaría incorrectamente
    minimize {
        exclude(dependency('org.xerial:sqlite-jdbc:.*'))
    }
}

build.dependsOn shadowJar
