name: ZeroWars
version: '${version}'
main: com.zerowars.ZeroWars
api-version: '1.20'
description: Competitive PvP Zone Control Plugin
authors: [zerinho23]
contributors: [The_Titan19]
website: https://github.com/zerowars

softdepend:
  - PlaceholderAPI

commands:
  zerowars:
    description: Comando principal de administración
    usage: /zerowars <subcomando>
    aliases: [zw]
    permission: zerowars.admin
  zone:
    description: Muestra info de la zona actual
    usage: /zone
    permission: zerowars.player
  zones:
    description: Lista todas las zonas
    usage: /zones
    permission: zerowars.player
  top:
    description: Muestra el ranking
    usage: /top [players|clans|zones]
    permission: zerowars.player
  events:
    description: Muestra los eventos activos
    usage: /events
    permission: zerowars.player

permissions:
  # ════════════════════════════════════
  #            ADMINISTRADOR
  # ════════════════════════════════════
  zerowars.admin:
    description: Acceso admin completo a ZeroWars
    default: op
    children:
      zerowars.admin.reload: true
      zerowars.admin.createzone: true
      zerowars.admin.deletezone: true
      zerowars.admin.setreward: true
      zerowars.admin.giveconsumable: true
      zerowars.admin.startevent: true
      zerowars.admin.stopevent: true
      zerowars.admin.debug: true
      zerowars.bypass: true

  zerowars.admin.reload:
    description: Recargar configuración del plugin
    default: op

  zerowars.admin.createzone:
    description: Crear una zona nueva
    default: op

  zerowars.admin.deletezone:
    description: Eliminar una zona
    default: op

  zerowars.admin.setreward:
    description: Configurar recompensas de zona
    default: op

  zerowars.admin.giveconsumable:
    description: Dar consumibles a jugadores
    default: op

  zerowars.admin.startevent:
    description: Iniciar un evento PvP manualmente
    default: op

  zerowars.admin.stopevent:
    description: Detener un evento activo
    default: op

  zerowars.admin.debug:
    description: Modo debug
    default: op

  # ════════════════════════════════════
  #             MODERADOR
  # ════════════════════════════════════
  zerowars.moderator:
    description: Acceso moderador
    default: false
    children:
      zerowars.moderator.reset: true
      zerowars.moderator.info: true

  zerowars.moderator.reset:
    description: Resetear captura de una zona
    default: false

  zerowars.moderator.info:
    description: Ver info detallada de zona/jugador
    default: false

  # ════════════════════════════════════
  #               JUGADOR
  # ════════════════════════════════════
  zerowars.player:
    description: Acceso base de jugador
    default: true
    children:
      zerowars.zone.info: true
      zerowars.zone.list: true
      zerowars.zone.capture: true
      zerowars.top: true
      zerowars.events: true
      zerowars.consumables.use: true

  zerowars.zone.info:
    description: Ver info de zona
    default: true

  zerowars.zone.list:
    description: Listar zonas
    default: true

  zerowars.zone.capture:
    description: Capturar zonas
    default: true

  zerowars.top:
    description: Ver leaderboards
    default: true

  zerowars.events:
    description: Ver eventos activos
    default: true

  # ════════════════════════════════════
  #            CONSUMIBLES
  # ════════════════════════════════════
  zerowars.consumables.use:
    description: Usar consumibles PvP
    default: true

  zerowars.consumables.bypass.cooldown:
    description: Saltar cooldown de consumibles
    default: op

  # ════════════════════════════════════
  #               BYPASS
  # ════════════════════════════════════
  zerowars.bypass:
    description: Saltar todas las restricciones
    default: op

  zerowars.bypass.pvp:
    description: Saltar restricciones PvP en zonas
    default: op

  zerowars.bypass.capture:
    description: Saltar requisitos de captura
    default: op
